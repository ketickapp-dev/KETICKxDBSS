<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBSS OS | Dynamic Inventory PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #0D1B2A; --glass-bg: rgba(18, 18, 18, 0.7); --glass-border: rgba(255, 255, 255, 0.15); 
            --text-main: #FFFFFF; --text-muted: #A0AEC0; --accent-blue: #007BFF; --accent-lime: #39FF14; 
            --accent-orange: #FFA500; --danger-red: #FF3B30; --warning-bg: rgba(255, 59, 48, 0.15);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0 0 90px 0; box-sizing: border-box; }
        .top-header { padding: 15px 20px; backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; background: rgba(13, 27, 42, 0.8); position: sticky; top: 0; z-index: 100; }
        .top-header h1 { margin: 0; font-size: 1.2rem; font-family: 'JetBrains Mono', monospace; color: var(--accent-lime); }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 20px; border-radius: 12px; backdrop-filter: blur(10px); margin-bottom: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .card h2 { margin-top: 0; font-size: 1.1rem; color: var(--accent-blue); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); padding-bottom: 8px; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group textarea { background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border); padding: 10px; border-radius: 6px; color: var(--text-main); font-family: inherit; font-size: 0.9rem; transition: all 0.3s ease; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent-blue); outline: none; box-shadow: 0 0 8px rgba(0, 123, 255, 0.5); }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: background 0.2s; display: inline-flex; align-items: center; gap: 5px; }
        .btn-primary { background: var(--accent-blue); color: white; }
        .btn-primary:hover { background: #0056b3; }
        .btn-success { background: var(--accent-lime); color: #0D1B2A; }
        .btn-success:hover { background: #2cd410; }
        .btn-warning { background: var(--accent-orange); color: white; }
        .btn-danger { background: var(--danger-red); color: white; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 10px; font-size: 0.9rem; }
        th { padding: 12px; border-bottom: 2px solid var(--glass-border); color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--glass-border); vertical-align: middle; }
        tr:hover { background: rgba(255, 255, 255, 0.02); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; font-family: 'JetBrains Mono', monospace; }
        .badge-critical { background: var(--warning-bg); color: var(--danger-red); border: 1px solid var(--danger-red); }
        .badge-normal { background: rgba(57, 255, 20, 0.1); color: var(--accent-lime); border: 1px solid var(--accent-lime); }
        .actions-cell { display: flex; gap: 5px; }
        .btn-sm { padding: 5px 10px; font-size: 0.8rem; border-radius: 4px; }
        
        /* Toast Notification */
        .toast { position: fixed; bottom: 20px; right: 20px; background: rgba(18, 18, 18, 0.9); border: 1px solid var(--glass-border); color: var(--text-main); padding: 12px 24px; border-radius: 8px; backdrop-filter: blur(10px); z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5); transform: translateY(100px); opacity: 0; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-left: 4px solid var(--accent-lime); }
        .toast.error { border-left: 4px solid var(--danger-red); }
        .toast.warning { border-left: 4px solid var(--accent-orange); }
        .toast.telegram { border-left: 4px solid #0088cc; }

        /* Navigation Bar */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(13, 27, 42, 0.95); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; padding: 10px 0; backdrop-filter: blur(10px); z-index: 999; }
        .nav-item { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; gap: 2px; font-family: 'JetBrains Mono', monospace; }
        .nav-item.active { color: var(--accent-lime); }
    </style>
</head>
<body>

    <div class="top-header">
        <h1>DBSS OS // INVENTORY.CORE</h1>
        <div id="connectionStatus" style="font-size: 0.8rem; color: var(--accent-lime); font-family: 'JetBrains Mono', monospace;">● SYSTEM ONLINE</div>
    </div>

    <div class="container">
        <div class="card">
            <h2>Pendaftaran / Kemaskini Item</h2>
            <form id="itemForm">
                <input type="hidden" id="editIndex" value="-1">
                <div class="grid-form">
                    <div class="form-group">
                        <label for="itemId">Kod / ID Item</label>
                        <input type="text" id="itemId" required placeholder="Contoh: DBSS-ESP32">
                    </div>
                    <div class="form-group">
                        <label for="itemName">Nama Item</label>
                        <input type="text" id="itemName" required placeholder="Contoh: ESP32 NodeMCU">
                    </div>
                    <div class="form-group">
                        <label for="itemQty">Kuantiti (Stok)</label>
                        <input type="number" id="itemQty" required min="0" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label for="itemPrice">Harga Kos / Seunit (RM)</label>
                        <input type="number" id="itemPrice" required step="0.01" min="0" placeholder="0.00">
                    </div>
                    <div class="form-group full-width">
                        <label for="itemDesc">Keterangan / Deskripsi Item</label>
                        <textarea id="itemDesc" rows="2" placeholder="Masukkan spesifikasi, lokasi rak, atau nota tambahan item di sini..."></textarea>
                    </div>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary" id="btnSubmit">Simpan Item</button>
                    <button type="button" class="btn btn-danger" id="btnCancel" style="display:none;" onclick="resetForm()">Batal</button>
                </div>
            </form>
        </div>

        <div class="card" style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: space-between;">
            <div>
                <span style="font-size: 0.9rem; color: var(--text-muted);">Utiliti Pengurusan Inventori:</span>
            </div>
            <div class="btn-group">
                <button class="btn btn-success" onclick="sendStockAlertToTelegram()">📢 Semak & Alert Telegram</button>
                <button class="btn btn-primary" onclick="exportCSV()">📊 Eksport Fail CSV</button>
            </div>
        </div>

        <div class="card">
            <h2>Pangkalan Data Stok Semasa</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>ID / Kod</th>
                            <th>Nama Item</th>
                            <th>Deskripsi / Keterangan</th>
                            <th>Stok</th>
                            <th>Harga (RM)</th>
                            <th>Status</th>
                            <th>Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <div class="nav-bar">
        <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="inventory.html" class="nav-item active">📦 Inventori</a>
        <a href="crm.html" class="nav-item">👥 CRM</a>
        <a href="invoice.html" class="nav-item">🧾 Invois</a>
        <a href="settings.html" class="nav-item">⚙️ Tetapan</a>
    </div>

    <script>
        let dbItems = [];
        let systemConfig = { tgBotToken: '', tgGroupChatId: '' };

        window.onload = function() {
            const savedProfile = localStorage.getItem('dbss_business_profile');
            if (savedProfile) {
                const profile = JSON.parse(savedProfile);
                systemConfig.tgBotToken = profile.tgBotToken || '';
                systemConfig.tgGroupChatId = profile.tgGroupChatId || '';
            }

            const savedInventory = localStorage.getItem('dbss_inventory_database');
            if (savedInventory) {
                dbItems = JSON.parse(savedInventory);
            } else {
                // Konfigurasi contoh kilang awal
                dbItems = [
                    { id: 'DBSS-ESP32', name: 'ESP32 NodeMCU Wi-Fi', desc: 'Modul IoT Utama untuk Smart Home v4', qty: 12, price: 25.00 },
                    { id: 'DBSS-RELAY4CH', name: 'Relay Module 4 Channel', desc: 'Kawalan lampu voltan tinggi isolated', qty: 3, price: 15.50 }
                ];
                localStorage.setItem('dbss_inventory_database', JSON.stringify(dbItems));
            }
            renderTable();
        };

        function renderTable() {
            const tbody = document.getElementById('inventoryTableBody');
            tbody.innerHTML = '';

            if (dbItems.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:var(--text-muted);">Tiada item di dalam pangkalan data inventori.</td></tr>`;
                return;
            }

            dbItems.forEach((item, index) => {
                const qty = parseInt(item.qty) || 0;
                const statusBadge = qty < 5 ? '<span class="badge badge-critical">STOK KRITIKAL</span>' : '<span class="badge badge-normal">STOK MENCUKUPI</span>';
                const descText = item.desc || '<span style="color:var(--text-muted); font-style:italic;">Tiada deskripsi</span>';
                const priceFormatted = (parseFloat(item.price) || 0).toFixed(2);

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-family:'JetBrains Mono', monospace; font-weight:bold; color:var(--accent-orange);">${item.id}</td>
                    <td><strong>${item.name}</strong></td>
                    <td style="max-width:300px; white-space:normal; font-size:0.85rem; color:var(--text-muted);">${descText}</td>
                    <td style="font-weight:bold; text-align:center;">${qty}</td>
                    <td style="font-family:'JetBrains Mono', monospace;">${priceFormatted}</td>
                    <td>${statusBadge}</td>
                    <td>
                        <div class="actions-cell">
                            <button class="btn btn-warning btn-sm" onclick="editItem(${index})">📝 Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteItem(${index})">🗑️ Padam</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('itemForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const id = document.getElementById('itemId').value.trim();
            const name = document.getElementById('itemName').value.trim();
            const qty = parseInt(document.getElementById('itemQty').value) || 0;
            const price = parseFloat(document.getElementById('itemPrice').value) || 0;
            const desc = document.getElementById('itemDesc').value.trim();
            const editIndex = parseInt(document.getElementById('editIndex').value);

            const newItem = { id, name, qty, price, desc };

            if (editIndex === -1) {
                const duplicate = dbItems.some(item => item.id.toUpperCase() === id.toUpperCase());
                if (duplicate) {
                    showToast("Ralat: Kod / ID Item telah wujud!", "error");
                    return;
                }
                dbItems.push(newItem);
                showToast("Item berjaya didaftarkan ke inventori.", "success");
            } else {
                dbItems[editIndex] = newItem;
                showToast("Data item berjaya dikemaskini.", "success");
            }

            localStorage.setItem('dbss_inventory_database', JSON.stringify(dbItems));
            resetForm();
            renderTable();
        });

        function editItem(index) {
            const item = dbItems[index];
            document.getElementById('itemId').value = item.id;
            document.getElementById('itemId').disabled = true;
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemQty').value = item.qty;
            document.getElementById('itemPrice').value = item.price;
            document.getElementById('itemDesc').value = item.desc || '';
            
            document.getElementById('editIndex').value = index;
            document.getElementById('btnSubmit').innerText = "Kemaskini Data";
            document.getElementById('btnCancel').style.display = "inline-flex";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteItem(index) {
            if (confirm(`Adakah anda pasti untuk memadam item ${dbItems[index].name}?`)) {
                dbItems.splice(index, 1);
                localStorage.setItem('dbss_inventory_database', JSON.stringify(dbItems));
                showToast("Item dikeluarkan dari pangkalan data.", "warning");
                renderTable();
            }
        }

        function resetForm() {
            document.getElementById('itemForm').reset();
            document.getElementById('itemId').disabled = false;
            document.getElementById('editIndex').value = "-1";
            document.getElementById('btnSubmit').innerText = "Simpan Item";
            document.getElementById('btnCancel').style.display = "none";
        }

        function showToast(message, type = "success") {
            const toast = document.getElementById('toast');
            toast.className = `toast show ${type}`;
            toast.innerText = `SYS.${type.toUpperCase()}: ${message}`;
            setTimeout(() => { toast.classList.remove('show'); }, 3500);
        }

        function exportCSV() {
            if(dbItems.length === 0) return showToast("Pangkalan data kosong. Tiada data untuk dieksport.", "error");
            
            let csv = 'ID / Kod,Nama Item,Deskripsi,Kuantiti,Harga Seunit (RM)\n';
            dbItems.forEach(item => {
                let cleanDesc = (item.desc || '').replace(/"/g, '""').replace(/\n/g, ' ');
                csv += `"${item.id}","${item.name}","${cleanDesc}",${item.qty},${item.price.toFixed(2)}\n`;
            });

            const blob = new Blob([csv], {type: 'text/csv'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `DBSS_Inventory_Export_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            showToast("Selesai mengeksport fail CSV.", "success");
        }

        function sendStockAlertToTelegram() {
            if (!systemConfig.tgBotToken || !systemConfig.tgGroupChatId) {
                return showToast("Sila tetapkan API Telegram di Modul Settings.", "error");
            }
            const criticalItems = dbItems.filter(item => (parseInt(item.qty) || 0) < 5);
            if (criticalItems.length === 0) return showToast("Tiada stok kritikal dikesan.", "warning");

            let message = "🚨 *AMARAN INVENTORI DBSS OS* 🚨\nSistem mendapati item berikut pada paras kritikal (Bawah 5 Unit):\n\n";
            criticalItems.forEach((item, i) => { 
                let descField = item.desc ? `\n   - Info: _${item.desc}_` : '';
                message += `${i+1}. *${item.id}*\n   - ${item.name}${descField}\n   - Baki: ${item.qty} Unit Sahaja\n\n`; 
            });
            message += "Sila jana Purchase Order (PO) segera.";

            const url = `https://api.telegram.org/bot${systemConfig.tgBotToken}/sendMessage`;
            fetch(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ chat_id: systemConfig.tgGroupChatId, text: message, parse_mode: 'Markdown' }) 
            })
            .then(res => res.json())
            .then(data => { 
                if (data.ok) showToast("Laporan Telegram berjaya dihantar!", "telegram"); 
                else showToast("Ralat Telegram: " + data.description, "error"); 
            })
            .catch(err => showToast("Gagal menghubungi Telegram API.", "error"));
        }
    </script>
</body>
</html>
