<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBSS OS | Business Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0D1B2A;
            --glass-bg: rgba(18, 18, 18, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --accent-blue: #007BFF;
            --accent-lime: #39FF14;
            --accent-orange: #FFA500;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0 0 90px 0;
            box-sizing: border-box;
        }

        .top-header {
            padding: 15px 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .module-title { font-weight: 700; font-size: 16px; color: var(--accent-lime); letter-spacing: 1px;}
        
        .container { padding: 15px; max-width: 800px; margin: 0 auto; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .panel-header { margin-bottom: 15px; border-bottom: 1px dashed var(--glass-border); padding-bottom: 10px;}
        h2 { margin: 0; font-size: 14px; color: var(--accent-orange); letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase;}

        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 10px; color: #A0AEC0; font-family: 'JetBrains Mono', monospace; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border); border-radius: 8px;
            color: var(--text-main); box-sizing: border-box; font-family: 'Inter', sans-serif;
        }
        textarea { resize: vertical; min-height: 80px; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent-lime); }

        .btn-save {
            width: 100%; background: var(--accent-lime); border: none;
            color: #000; padding: 15px; border-radius: 8px; font-weight: 700;
            cursor: pointer; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace;
            margin-top: 10px;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: rgba(13, 27, 42, 0.9); backdrop-filter: blur(15px);
            border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #A0AEC0; text-decoration: none; font-size: 10px; gap: 5px; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="module-title">MODULE: BIZ PROFILE</div>
        <div style="font-size: 10px; color: #A0AEC0; font-family: 'JetBrains Mono';">SYS.CONFIG</div>
    </header>

    <div class="container">
        
        <div class="glass-panel">
            <div class="panel-header">
                <h2>1. Maklumat Syarikat Utama</h2>
            </div>
            
            <div class="input-group">
                <label>Nama Syarikat / Perniagaan</label>
                <input type="text" id="bizName" placeholder="Cth: DBMART HOME TRADING">
            </div>
            <div class="input-group">
                <label>No. Pendaftaran (SSM)</label>
                <input type="text" id="bizSSM" placeholder="Cth: 202301234567 (00123456-T)">
            </div>
            <div class="input-group">
                <label>No. Telefon Rasmi</label>
                <input type="text" id="bizPhone" placeholder="Cth: +6012-345 6789">
            </div>
            <div class="input-group">
                <label>Alamat Penuh Syarikat</label>
                <textarea id="bizAddress" placeholder="Masukkan alamat lengkap operasi..."></textarea>
            </div>
        </div>

        <div class="glass-panel">
            <div class="panel-header">
                <h2>2. Maklumat Kewangan & Terma</h2>
            </div>
            
            <div class="input-group">
                <label>Maklumat Akaun Bank (Untuk Pembayaran)</label>
                <textarea id="bizBank" placeholder="Cth: MAYBANK ISLAMIC&#10;DBMART HOME TRADING&#10;5512 3456 7890"></textarea>
            </div>
            <div class="input-group">
                <label>Terma & Syarat (Quotation / Invois)</label>
                <textarea id="bizTerms" placeholder="Cth: 1. Deposit 50% diperlukan sebelum pemasangan.&#10;2. Baki bayaran dijelaskan selepas siap.&#10;3. Jaminan 1 tahun untuk perkakasan."></textarea>
            </div>
        </div>

        <button class="btn-save" onclick="saveProfile()">SIMPAN PROFIL SYARIKAT</button>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor"></path></svg>
            Command
        </a>
        <a href="sebutharga.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor"></path><polyline points="14 2 14 8 20 8" stroke="currentColor"></polyline></svg>
            Quote
        </a>
        <a href="inventory.html" class="nav-item">
            <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3" stroke="currentColor"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" stroke="currentColor"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" stroke="currentColor"></path></svg>
            DB_Items
        </a>
        <a href="business.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" fill="none" stroke="currentColor" stroke-width="2"></path><circle cx="12" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2"></circle></svg>
            Profile
        </a>
    </nav>

    <script>
        // Paparkan profil sedia ada apabila sistem dimuatkan
        window.onload = function() {
            const savedProfile = localStorage.getItem('dbss_business_profile');
            if (savedProfile) {
                const profile = JSON.parse(savedProfile);
                document.getElementById('bizName').value = profile.name || '';
                document.getElementById('bizSSM').value = profile.ssm || '';
                document.getElementById('bizPhone').value = profile.phone || '';
                document.getElementById('bizAddress').value = profile.address || '';
                document.getElementById('bizBank').value = profile.bank || '';
                document.getElementById('bizTerms').value = profile.terms || '';
            }
        };

        // Simpan input ke memori peranti
        function saveProfile() {
            const profile = {
                name: document.getElementById('bizName').value,
                ssm: document.getElementById('bizSSM').value,
                phone: document.getElementById('bizPhone').value,
                address: document.getElementById('bizAddress').value,
                bank: document.getElementById('bizBank').value,
                terms: document.getElementById('bizTerms').value
            };

            localStorage.setItem('dbss_business_profile', JSON.stringify(profile));
            alert("SYS.SUCCESS: Profil syarikat telah dikemas kini. Dokumen sebutharga akan menggunakan data terbaharu ini.");
        }
    </script>
</body>
</html>
