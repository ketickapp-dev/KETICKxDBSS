<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBSS OS | Advanced CRM (Bento Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #0D1B2A; --glass-bg: rgba(18, 18, 18, 0.4); --glass-border: rgba(255, 255, 255, 0.08); 
            --text-main: #FFFFFF; --text-muted: #8B9BB4; --accent-blue: #007BFF; --accent-lime: #39FF14; 
            --accent-orange: #FFA500; --accent-red: #FF3B30; --accent-cyan: #00FFFF; --accent-purple: #9D4EDD;
            --bento-gap: 16px; --bento-radius: 24px;
        }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0 0 90px 0; box-sizing: border-box; 
               background-image: radial-gradient(circle at 50% -10%, #1a2a40 0%, var(--bg-dark) 70%); background-attachment: fixed; min-height: 100vh;}
        
        /* HEADER - SLIM & SLEEK */
        .top-header { padding: 15px 20px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; background: rgba(13, 27, 42, 0.7);}
        .module-title { font-weight: 800; font-size: 16px; color: #fff; letter-spacing: 2px; font-family: 'JetBrains Mono', monospace;}
        .module-title span { color: var(--accent-blue); }
        
        .container { padding: var(--bento-gap); max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: var(--bento-gap);}

        /* BENTO GRID SYSTEM */
        .bento-row { display: grid; gap: var(--bento-gap); }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        @media (max-width: 600px) { .grid-3 { grid-template-columns: repeat(2, 1fr); } }

        /* BENTO CARDS & MICRO-INTERACTIONS */
        .bento-card { 
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.3) 100%); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: var(--bento-radius); 
            padding: 20px; position: relative; overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        
        .bento-card.interactive { cursor: pointer; }
        .bento-card.interactive:hover {
            transform: translateY(-5px) scale(1.02);
            background: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, rgba(0,0,0,0.4) 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.2);
        }
        .bento-card.interactive:active { transform: translateY(0) scale(0.98); }

        .bento-card.glow-blue:hover { border-color: rgba(0, 123, 255, 0.5); box-shadow: 0 10px 40px rgba(0, 123, 255, 0.15); }
        .bento-card.glow-purple:hover { border-color: rgba(157, 78, 221, 0.5); box-shadow: 0 10px 40px rgba(157, 78, 221, 0.15); }
        .bento-card.glow-lime:hover { border-color: rgba(57, 255, 20, 0.5); box-shadow: 0 10px 40px rgba(57, 255, 20, 0.15); }
        .bento-card.glow-orange:hover { border-color: rgba(255, 165, 0, 0.5); box-shadow: 0 10px 40px rgba(255, 165, 0, 0.15); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .card-icon { width: 36px; height: 36px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 16px; background: rgba(255,255,255,0.05); transition: 0.3s; }
        .bento-card.interactive:hover .card-icon { transform: rotate(10deg) scale(1.1); }
        
        .card-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-family: 'JetBrains Mono', monospace; font-weight: 600; letter-spacing: 0.5px;}
        .card-value { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; margin: 5px 0 0 0; line-height: 1.1; color: #fff;}

        /* ACTION MATRIX TEXT */
        .matrix-content { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 8px; padding: 10px 0;}
        .matrix-icon { font-size: 24px; transition: 0.3s; }
        .bento-card.interactive:hover .matrix-icon { transform: translateY(-3px) scale(1.1); }
        .matrix-text { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--text-muted); transition: 0.3s;}
        .bento-card.interactive:hover .matrix-text { color: #fff; }

        /* CONTROL PANEL (SEARCH & FILTER) */
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .control-grid { grid-template-columns: 1fr; } }
        input, select, textarea { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'Inter', sans-serif; font-size: 13px; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);}
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent-blue); background: rgba(0,0,0,0.5); box-shadow: 0 0 15px rgba(0,123,255,0.2);}
        .input-label { display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; font-weight: bold; text-transform: uppercase;}

        /* LIQUID SELECT UI */
        .liquid-select-wrapper { position: relative; width: 100%; margin-bottom: 12px; font-family: 'Inter', sans-serif; }
        .liquid-header { 
            width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: var(--accent-lime); font-weight: 600; font-size: 13px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; transition: all 0.3s ease;
        }
        .liquid-select-wrapper.open .liquid-header, .liquid-header:hover { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(0, 123, 255, 0.2); }
        .liquid-list { 
            position: absolute; top: 100%; left: 0; width: 100%; background: rgba(13, 27, 42, 0.95); backdrop-filter: blur(16px); 
            border: 1px solid var(--accent-blue); border-radius: 12px; margin-top: 5px; max-height: 0; overflow: hidden; opacity: 0;
            transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100;
        }
        .liquid-select-wrapper.open .liquid-list { max-height: 250px; overflow-y: auto; opacity: 1; }
        .liquid-item { padding: 12px 15px; color: var(--text-main); font-size: 13px; cursor: pointer; position: relative; overflow: hidden; z-index: 1; border-bottom: 1px solid rgba(255,255,255,0.05); transition: color 0.3s; }
        .liquid-item:last-child { border-bottom: none; }
        .liquid-item::before { content: ''; position: absolute; bottom: -100%; left: 0; width: 100%; height: 100%; background: rgba(0, 123, 255, 0.8); z-index: -1; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 50% 50% 0 0; }
        .liquid-item:hover::before, .liquid-item.clicked::before { bottom: 0; border-radius: 0; }
        .liquid-item:hover, .liquid-item.clicked { color: #fff; font-weight: 600; }
        .liquid-item.selected { color: var(--accent-lime); background: rgba(255,255,255,0.05); }

        /* CRM CLIENT CARDS (MINI BENTO LIST) */
        .client-grid { display: grid; grid-template-columns: 1fr; gap: 12px; max-height: 60vh; overflow-y: auto; padding-right: 5px; margin-top: 10px;}
        .client-grid::-webkit-scrollbar { width: 4px; }
        .client-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .client-card { 
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 16px; padding: 15px; display: grid; grid-template-columns: 1fr auto; 
            gap: 10px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); cursor: default;
        }
        .client-card:hover { 
            background: rgba(255,255,255,0.05); transform: translateX(5px); 
            border-color: rgba(255,255,255,0.15); box-shadow: -5px 5px 15px rgba(0,0,0,0.2);
        }

        .client-info h3 { margin: 0 0 5px 0; font-size: 15px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px;}
        .client-info p { margin: 2px 0; font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 5px;}
        
        .client-badge { font-size: 9px; padding: 3px 8px; border-radius: 6px; font-weight: bold; text-transform: uppercase; font-family: 'JetBrains Mono', monospace;}
        .badge-client { background: rgba(0, 123, 255, 0.15); color: var(--accent-blue); border: 1px solid var(--accent-blue); }
        .badge-lead { background: rgba(255, 165, 0, 0.15); color: var(--accent-orange); border: 1px solid var(--accent-orange); }
        .badge-maintenance { background: rgba(157, 78, 221, 0.15); color: var(--accent-purple); border: 1px solid var(--accent-purple); }
        .badge-supplier { background: rgba(23, 162, 184, 0.15); color: var(--accent-teal); border: 1px solid var(--accent-teal); }

        .client-actions { display: flex; flex-direction: column; gap: 6px; justify-content: center; }
        .btn-action { 
            background: rgba(255,255,255,0.05); border: none; color: #fff; border-radius: 8px; 
            padding: 8px; cursor: pointer; transition: 0.2s; font-size: 12px; display: flex; align-items: center; justify-content: center;
        }
        .btn-action:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
        .btn-action.quote:hover { background: var(--accent-orange); color: #000; }
        .btn-action.edit:hover { background: var(--accent-blue); color: #fff; }
        .btn-action.delete:hover { background: var(--accent-red); color: #fff; }

        /* MODAL (BENTO STYLE) */
        .custom-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; pointer-events: none; transition: 0.3s ease; }
        .custom-overlay.show { opacity: 1; pointer-events: auto; }
        .custom-modal { background: rgba(18, 18, 18, 0.95); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px; width: 90%; max-width: 500px; padding: 25px; transform: translateY(30px) scale(0.95); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-height: 85vh; overflow-y: auto;}
        .custom-overlay.show .custom-modal { transform: translateY(0) scale(1); }
        
        .modal-title { font-size: 16px; color: var(--accent-blue); font-weight: 800; margin-bottom: 20px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 15px;}
        
        .input-group { margin-bottom: 10px; }
        .quick-date-wrapper { display: flex; gap: 5px; margin-top: 5px; }
        .date-pill { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #A0AEC0; font-size: 10px; font-weight: bold; font-family: 'JetBrains Mono', monospace; padding: 5px 0; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .date-pill:hover, .date-pill:active { background: rgba(0,123,255,0.2); border-color: var(--accent-blue); color: #fff; }

        .modal-actions { display: flex; gap: 10px; margin-top: 25px; }
        .btn-modal { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 12px; transition: 0.2s;}
        .btn-cancel { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); color: #fff;}
        .btn-save { background: var(--accent-blue); color: #fff; }
        .btn-save:hover { background: #0056b3; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,123,255,0.4);}

        /* TOAST & ALERTS */
        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px; pointer-events: none; }
        .toast { background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(12px); border-radius: 12px; padding: 15px 20px; color: #fff; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); opacity: 0; transform: translateY(-20px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1);}
        .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .toast-success { border-left: 4px solid var(--accent-lime); }
        .toast-error { border-left: 4px solid var(--accent-red); }

        /* WARNING CUSTOM ALERT BOX */
        .warning-stripes { height: 8px; width: 100%; background: repeating-linear-gradient(45deg, #FF3B30, #FF3B30 10px, #000 10px, #000 20px); border-top-left-radius: 20px; border-top-right-radius: 20px;}
        .alert-content { padding: 25px 20px; text-align: center; }
        .alert-title { color: var(--accent-orange); font-family: 'JetBrains Mono', monospace; font-size: 16px; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px;}
        .alert-message { color: #fff; font-size: 13px; margin-bottom: 25px; line-height: 1.5; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: rgba(13, 27, 42, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 10px; gap: 6px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        .nav-item.active { color: var(--accent-blue); transform: translateY(-5px);}
        .nav-item:hover:not(.active) { color: #fff; transform: translateY(-3px);}
        .nav-item svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <div id="toastContainer" class="toast-container"></div>

    <header class="top-header">
        <div class="module-title">DBSS <span>CRM</span></div>
        <div style="font-size: 10px; color: var(--accent-blue); font-family: 'JetBrains Mono'; font-weight:bold; display:flex; align-items:center; gap:5px;">
            <div style="width:6px; height:6px; background:var(--accent-blue); border-radius:50%; box-shadow:0 0 5px var(--accent-blue); animation: softPulse 2s infinite;"></div>
            DATABASE SYNCED
        </div>
    </header>

    <div class="container">
        
        <div class="bento-row grid-3">
            <div class="bento-card glow-blue" style="padding: 15px;">
                <div class="card-title">KLIEN AKTIF</div>
                <div class="card-value" id="statClients" style="font-size: 24px; color:var(--accent-blue);">0</div>
            </div>
            <div class="bento-card glow-orange" style="padding: 15px;">
                <div class="card-title">PROSPEK (LEADS)</div>
                <div class="card-value" id="statLeads" style="font-size: 24px; color:var(--accent-orange);">0</div>
            </div>
            <div class="bento-card glow-purple" style="padding: 15px;">
                <div class="card-title">PEMBEKAL</div>
                <div class="card-value" id="statSuppliers" style="font-size: 24px; color:var(--accent-purple);">0</div>
            </div>
        </div>

        <div class="bento-row grid-3">
            <div class="bento-card interactive glow-blue" onclick="openCRMModal()">
                <div class="matrix-content">
                    <div class="matrix-icon" style="color:var(--accent-blue);">➕</div>
                    <div class="matrix-text">KLIEN BARU</div>
                </div>
            </div>
            <div class="bento-card interactive glow-lime" onclick="exportCSV()">
                <div class="matrix-content">
                    <div class="matrix-icon" style="color:var(--accent-lime);">📊</div>
                    <div class="matrix-text">EKSPORT CSV</div>
                </div>
            </div>
            <div class="bento-card interactive glow-cyan" onclick="sendCRMAlertToTelegram()">
                <div class="matrix-content">
                    <div class="matrix-icon" style="color:var(--accent-cyan);">✈️</div>
                    <div class="matrix-text">PING STAF</div>
                </div>
            </div>
        </div>

        <div class="bento-row">
            <div class="bento-card" style="padding: 15px 20px;">
                <div class="card-title" style="margin-bottom: 15px;">🔍 TAPISAN PANGKALAN DATA</div>
                <div class="control-grid">
                    <div>
                        <input type="text" id="searchInput" placeholder="Cari nama atau no. telefon..." onkeyup="renderCRM()">
                    </div>
                    <div>
                        <select id="typeFilter" onchange="renderCRM()">
                            <option value="ALL">SEMUA KATEGORI</option>
                            <option value="CLIENT">Pelanggan Sedia Ada</option>
                            <option value="LEAD">Prospek / Lead Baru</option>
                            <option value="MAINTENANCE">Kontrak Penyelenggaraan</option>
                            <option value="SUPPLIER">Pembekal / Sub-Con</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="bento-row">
            <div class="bento-card" style="padding: 20px 20px 10px 20px;">
                <div class="card-title" style="margin-bottom: 10px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 15px;">📁 SENARAI REKOD</div>
                <div class="client-grid" id="crmContainer">
                    </div>
            </div>
        </div>

    </div>

    <div class="custom-overlay" id="crmModalOverlay">
        <div class="custom-modal" style="padding:0; overflow:hidden;">
            <div style="padding: 20px;">
                <div class="modal-title" id="modalTitle">
                    <span>TAMBAH REKOD BARU</span>
                    <button style="background:transparent; border:none; color:var(--text-muted); cursor:pointer;" onclick="closeCRMModal()">✖</button>
                </div>
                
                <input type="hidden" id="editIndex" value="-1">
                
                <div class="control-grid">
                    <div class="input-group">
                        <label class="input-label">KATEGORI REKOD</label>
                        <select id="modalType" onchange="toggleAssessmentFields()">
                            <option value="CLIENT">Pelanggan Sedia Ada</option>
                            <option value="LEAD">Prospek (Lead)</option>
                            <option value="MAINTENANCE">Penyelenggaraan</option>
                            <option value="SUPPLIER">Pembekal (Supplier)</option>
                            <option value="SUB-CONTRACTOR">Sub-Contractor</option>
                            <option value="OTHERS">Lain-lain</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="input-label">ID RUJUKAN</label>
                        <input type="text" id="modalId" placeholder="Auto-jana jika kosong">
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">NAMA PENUH / SYARIKAT</label>
                    <input type="text" id="modalName" placeholder="Masukkan nama..." required>
                </div>

                <div class="control-grid">
                    <div class="input-group">
                        <label class="input-label">NO. TELEFON</label>
                        <input type="tel" id="modalPhone" placeholder="Contoh: 0123456789" required>
                    </div>
                    <div class="input-group" id="leadBox">
                        <label class="input-label">SUMBER (LEAD)</label>
                        <select id="modalLead">
                            <option value="WhatsApp">WhatsApp</option>
                            <option value="Facebook / FB Ads">Facebook / FB Ads</option>
                            <option value="Tiktok">Tiktok</option>
                            <option value="Google Maps">Google Maps</option>
                            <option value="Referral">Referral (Rujukan)</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">ALAMAT LENGKAP</label>
                    <textarea id="modalAddress" rows="2" placeholder="Masukkan alamat..."></textarea>
                </div>

                <div id="assessmentSection">
                    <div class="control-grid">
                        <div class="input-group">
                            <label class="input-label">STATUS PIPELINE</label>
                            <select id="modalStatus">
                                <option value="NEW LEAD">NEW LEAD (Prospek Baru)</option>
                                <option value="FOLLOW UP">FOLLOW UP (Susulan)</option>
                                <option value="QUOTATION SENT">QUOTATION SENT</option>
                                <option value="NEGOTIATION">NEGOTIATION</option>
                                <option value="K.I.V">K.I.V (Tangguh)</option>
                                <option value="CLOSED WIN">CLOSED WIN (Berjaya)</option>
                                <option value="CLOSED LOST">CLOSED LOST (Batal)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label class="input-label">TARIKH FOLLOW-UP</label>
                            <input type="date" id="modalFollowUp">
                            <div class="quick-date-wrapper">
                                <button type="button" class="date-pill" onclick="setQuickDate(1)">+1H</button>
                                <button type="button" class="date-pill" onclick="setQuickDate(3)">+3H</button>
                                <button type="button" class="date-pill" onclick="setQuickDate(7)">+1M</button>
                            </div>
                        </div>
                    </div>

                    <div class="control-grid">
                        <div class="input-group">
                            <label class="input-label">JENIS SISTEM</label>
                            <select id="modalSystem">
                                <option value="CCTV System">CCTV System</option>
                                <option value="Alarm System">Alarm System</option>
                                <option value="Autogate System">Autogate System</option>
                                <option value="Door Access">Door Access</option>
                                <option value="Networking">Networking / WiFi</option>
                                <option value="Mixed">Mixed (Gabungan)</option>
                                <option value="Others">Others</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label class="input-label">KONDISI TAPAK</label>
                            <select id="modalCondition">
                                <option value="Surface Wiring">Surface Wiring</option>
                                <option value="Conceal Wiring">Conceal Wiring</option>
                                <option value="Roof / Ceiling">Roof / Ceiling</option>
                                <option value="Wireless">Wireless</option>
                                <option value="Mixed">Mixed Condition</option>
                                <option value="TBC">To Be Confirmed</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">NOTA / KETERANGAN</label>
                    <textarea id="modalNotes" rows="2" placeholder="Nota tambahan tentang entiti ini..."></textarea>
                </div>

                <div class="modal-actions">
                    <button class="btn-modal btn-cancel" onclick="closeCRMModal()">BATAL</button>
                    <button class="btn-modal btn-save" onclick="saveContact()">SIMPAN REKOD</button>
                </div>
            </div>
        </div>
    </div>

    <div class="custom-overlay" id="alertOverlay">
        <div class="custom-modal" style="max-width: 350px; padding:0; overflow:hidden;">
            <div class="warning-stripes"></div>
            <div class="alert-content">
                <div class="alert-title" style="color:var(--accent-red); margin-bottom:5px;">PENGESAHAN SISTEM</div>
                <p id="alertMessage" style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">Adakah anda pasti?</p>
                <div class="alert-actions">
                    <button class="btn-modal btn-cancel" onclick="closeAlert()">BATAL</button>
                    <button class="btn-modal btn-save" id="alertConfirmBtn" style="background:var(--accent-red);">TERUSKAN</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            Command
        </a>
        <a href="crm.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            Workspace
        </a>
        <a href="settings.html" class="nav-item">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            System
        </a>
    </nav>

    <script>
        let crmDatabase = [];
        let systemConfig = { tgBotToken: '', tgGroupChatId: '', tgAuditChatId: '' };

        window.onload = function() {
            setupLiquidSelects();
            const savedProfile = localStorage.getItem('dbss_business_profile');
            if (savedProfile) {
                const profile = JSON.parse(savedProfile);
                systemConfig.tgBotToken = profile.tgBotToken || '';
                systemConfig.tgGroupChatId = profile.tgGroupChatId || '';
                systemConfig.tgAuditChatId = profile.tgAuditChatId || '';
            }

            const savedCRM = localStorage.getItem('dbss_crm_database');
            if (savedCRM) { crmDatabase = JSON.parse(savedCRM); } 
            
            renderCRM();
            checkUrgentFollowUps();
        };

        // --- ENJIN TELEGRAM ---
        async function sendTelegramAlert(message, isAudit = false) {
            const botToken = systemConfig.tgBotToken;
            let chatId = isAudit ? systemConfig.tgAuditChatId : systemConfig.tgGroupChatId;
            if (!chatId && isAudit) chatId = systemConfig.tgGroupChatId;
            if (!botToken || !chatId) return;

            const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'Markdown' })
                });
            } catch (e) { console.error("Gagal ping Telegram", e); }
        }

        // --- UI UTILS ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div'); toast.className = `toast toast-${type}`;
            let icon = type === 'success' ? '✅' : type === 'error' ? '❌' : '⚠️';
            toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3500);
        }

        function setQuickDate(days) {
            const date = new Date(); date.setDate(date.getDate() + days);
            document.getElementById('modalFollowUp').value = date.toISOString().split('T')[0];
        }

        function showAlert(msg, confirmCallback) {
            document.getElementById('alertMessage').innerText = msg;
            document.getElementById('alertConfirmBtn').onclick = () => { closeAlert(); confirmCallback(); };
            document.getElementById('alertOverlay').classList.add('show');
        }
        function closeAlert() { document.getElementById('alertOverlay').classList.remove('show'); }

        // --- LIQUID SELECT ---
        function setupLiquidSelects() {
            document.querySelectorAll('select').forEach(select => {
                select.style.display = 'none'; 
                const wrapper = document.createElement('div'); wrapper.className = 'liquid-select-wrapper'; wrapper.id = 'liquid-wrap-' + select.id;
                const header = document.createElement('div'); header.className = 'liquid-header';
                header.innerHTML = `<span>${select.options[select.selectedIndex].text}</span><span style="font-size:10px;">▼</span>`;
                const list = document.createElement('div'); list.className = 'liquid-list';
                
                Array.from(select.options).forEach((opt, index) => {
                    const item = document.createElement('div'); item.className = 'liquid-item';
                    if(index === select.selectedIndex) item.classList.add('selected');
                    item.innerText = opt.text;
                    item.addEventListener('click', (e) => {
                        e.stopPropagation(); item.classList.add('clicked');
                        setTimeout(() => {
                            select.value = opt.value; select.dispatchEvent(new Event('change'));
                            header.querySelector('span').innerText = opt.text;
                            wrapper.classList.remove('open'); wrapper.style.zIndex = "1";
                            list.querySelectorAll('.liquid-item').forEach(i => i.classList.remove('selected', 'clicked'));
                            item.classList.add('selected');
                        }, 250);
                    });
                    list.appendChild(item);
                });
                header.addEventListener('click', (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.liquid-select-wrapper').forEach(w => { if(w !== wrapper) { w.classList.remove('open'); w.style.zIndex = "1"; } });
                    wrapper.classList.toggle('open'); wrapper.style.zIndex = wrapper.classList.contains('open') ? "99" : "1";
                });
                wrapper.appendChild(header); wrapper.appendChild(list); select.parentNode.insertBefore(wrapper, select.nextSibling);
            });
            document.addEventListener('click', () => { document.querySelectorAll('.liquid-select-wrapper').forEach(w => { w.classList.remove('open'); w.style.zIndex = "1"; }); });
        }
        function syncLiquidSelect(selectId) {
            const select = document.getElementById(selectId); const wrapper = document.getElementById('liquid-wrap-' + selectId);
            if(select && wrapper) {
                wrapper.querySelector('.liquid-header span').innerText = select.options[select.selectedIndex].text;
                wrapper.querySelectorAll('.liquid-item').forEach((item, idx) => { item.classList.toggle('selected', idx === select.selectedIndex); });
            }
        }

        // --- CRM LOGIC ---
        function toggleAssessmentFields() {
            const type = document.getElementById('modalType').value;
            const isB2B = ['SUPPLIER', 'SUB-CONTRACTOR', 'OTHERS'].includes(type);
            document.getElementById('assessmentSection').style.display = isB2B ? 'none' : 'block';
            document.getElementById('leadBox').style.display = isB2B ? 'none' : 'block';
        }

        function openCRMModal(isEdit = false, id = null) {
            if(isEdit && id !== null) {
                document.getElementById('modalTitle').innerHTML = `<span>SUNTING REKOD</span><button style="background:transparent; border:none; color:var(--text-muted); cursor:pointer;" onclick="closeCRMModal()">✖</button>`;
                
                const c = crmDatabase.find(x => x.id === id);
                document.getElementById('editIndex').value = crmDatabase.findIndex(x => x.id === id);
                
                document.getElementById('modalType').value = c.type || 'CLIENT';
                document.getElementById('modalId').value = c.id;
                document.getElementById('modalName').value = c.name;
                document.getElementById('modalPhone').value = c.phone;
                document.getElementById('modalLead').value = c.lead || 'WhatsApp';
                document.getElementById('modalAddress').value = c.address || '';
                
                if(!['SUPPLIER', 'SUB-CONTRACTOR', 'OTHERS'].includes(c.type)) {
                    document.getElementById('modalStatus').value = c.status || 'NEW LEAD';
                    document.getElementById('modalFollowUp').value = c.followUp || '';
                    document.getElementById('modalSystem').value = c.system || 'CCTV System';
                    document.getElementById('modalCondition').value = c.condition || 'Surface Wiring';
                }
                document.getElementById('modalNotes').value = c.notes || '';
            } else {
                document.getElementById('modalTitle').innerHTML = `<span>TAMBAH REKOD BARU</span><button style="background:transparent; border:none; color:var(--text-muted); cursor:pointer;" onclick="closeCRMModal()">✖</button>`;
                document.getElementById('editIndex').value = "-1";
                document.getElementById('modalId').value = `C-${Date.now().toString().slice(-5)}`;
                document.getElementById('modalName').value = '';
                document.getElementById('modalPhone').value = '';
                document.getElementById('modalAddress').value = '';
                document.getElementById('modalNotes').value = '';
                document.getElementById('modalFollowUp').value = '';
            }
            syncLiquidSelect('modalType'); syncLiquidSelect('modalLead'); syncLiquidSelect('modalStatus'); syncLiquidSelect('modalSystem'); syncLiquidSelect('modalCondition');
            toggleAssessmentFields();
            document.getElementById('crmModalOverlay').classList.add('show');
        }

        function closeCRMModal() { document.getElementById('crmModalOverlay').classList.remove('show'); }

        function saveContact() {
            const name = document.getElementById('modalName').value.trim();
            if(!name) return showToast("Sila masukkan Nama/Syarikat!", "error");

            const index = document.getElementById('editIndex').value;
            const isNew = index === "-1";
            
            const contactType = document.getElementById('modalType').value;
            const isB2B = ['SUPPLIER', 'SUB-CONTRACTOR', 'OTHERS'].includes(contactType);

            let id = document.getElementById('modalId').value;
            if(!id) id = `C-${Date.now().toString().slice(-5)}`;

            const contactData = {
                id: id, type: contactType, name: name, phone: document.getElementById('modalPhone').value.trim(),
                address: document.getElementById('modalAddress').value.trim(),
                status: isB2B ? '' : document.getElementById('modalStatus').value,
                followUp: isB2B ? '' : document.getElementById('modalFollowUp').value,
                lead: isB2B ? '' : document.getElementById('modalLead').value,
                system: isB2B ? '' : document.getElementById('modalSystem').value,
                condition: isB2B ? '' : document.getElementById('modalCondition').value,
                notes: document.getElementById('modalNotes').value.trim(),
                dateAdded: isNew ? new Date().toLocaleDateString('ms-MY') : crmDatabase[index].dateAdded
            };

            if(!isNew) crmDatabase[index] = contactData;
            else crmDatabase.unshift(contactData);

            localStorage.setItem('dbss_crm_database', JSON.stringify(crmDatabase));
            showToast(`Data ${name} berjaya disimpan!`, "success");

            // TELEGRAM: 1. LEAD PING
            if(isNew && !isB2B && contactData.status === 'NEW LEAD') {
                const tgMsg = `🔔 *PROSPEK BARU MASUK!*\n👤 Nama: ${contactData.name}\n📱 Tel: ${contactData.phone || '-'}\n🎯 Sumber: ${contactData.lead}\n🛠️ Sistem: ${contactData.system}\n📝 Nota: ${contactData.notes || '-'}`;
                sendTelegramAlert(tgMsg, false);
            }

            closeCRMModal(); renderCRM();
        }

        function renderCRM() {
            const container = document.getElementById('crmContainer');
            const searchQ = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;

            container.innerHTML = '';
            
            let cCount = 0; let lCount = 0; let sCount = 0;
            crmDatabase.forEach(c => { 
                if(c.type === 'CLIENT') cCount++; 
                if(c.type === 'LEAD') lCount++; 
                if(['SUPPLIER', 'SUB-CONTRACTOR'].includes(c.type)) sCount++;
            });
            document.getElementById('statClients').innerText = cCount;
            document.getElementById('statLeads').innerText = lCount;
            document.getElementById('statSuppliers').innerText = sCount;

            const filteredData = crmDatabase.filter(c => {
                const matchSearch = c.name.toLowerCase().includes(searchQ) || (c.phone && c.phone.toLowerCase().includes(searchQ));
                const matchType = typeFilter === 'ALL' ? true : c.type === typeFilter;
                return matchSearch && matchType;
            });

            if(filteredData.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:12px; padding:20px;">0 Rekod Dijumpai.</div>';
                return;
            }

            const today = new Date().toISOString().split('T')[0];

            filteredData.forEach((c) => {
                const isB2B = ['SUPPLIER', 'SUB-CONTRACTOR', 'OTHERS'].includes(c.type);
                
                let badgeClass = 'badge-client'; let badgeText = 'KLIEN';
                if(c.type === 'LEAD') { badgeClass = 'badge-lead'; badgeText = 'LEAD'; }
                else if(c.type === 'MAINTENANCE') { badgeClass = 'badge-maintenance'; badgeText = 'KONTRAK'; }
                else if(isB2B) { badgeClass = 'badge-supplier'; badgeText = 'B2B'; }

                let isUrgent = (!isB2B && c.followUp && c.followUp <= today && !['CLOSED WIN', 'CLOSED LOST'].includes(c.status));
                let borderStyle = isUrgent ? `border-left: 3px solid var(--accent-orange); background: rgba(255, 165, 0, 0.05);` : ``;

                let waBtn = '';
                if (c.phone) {
                    let cleanPhone = c.phone.replace(/\D/g, ''); if (cleanPhone.startsWith('0')) cleanPhone = '6' + cleanPhone;
                    waBtn = `<button class="btn-action" style="color:var(--accent-lime);" onclick="window.open('https://wa.me/${cleanPhone}', '_blank')">💬</button>`;
                }

                let quoteBtn = !isB2B ? `<button class="btn-action quote" onclick="pushToQuotation('${c.id}')" title="Jana Sebutharga">📄 QT</button>` : '';

                const card = document.createElement('div');
                card.className = 'client-card';
                card.style = borderStyle;
                card.innerHTML = `
                    <div class="client-info">
                        <h3>${c.name} <span class="client-badge ${badgeClass}">${badgeText}</span></h3>
                        <p>📞 ${c.phone || '-'} &nbsp;|&nbsp; 🏷️ ${c.id}</p>
                        ${!isB2B ? `<p style="color:#fff; margin-top:8px;">📌 Status: <span style="color:var(--accent-cyan);">${c.status || 'Baru'}</span></p>` : ''}
                        ${c.followUp ? `<p style="color:var(--accent-orange);">🗓️ Follow-Up: ${c.followUp}</p>` : ''}
                    </div>
                    <div class="client-actions" style="flex-direction:row; justify-content:flex-end; align-items:center;">
                        ${waBtn}
                        ${quoteBtn}
                        <button class="btn-action edit" onclick="openCRMModal(true, '${c.id}')">📝</button>
                        <button class="btn-action delete" onclick="deleteContact('${c.id}')">🗑️</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function checkUrgentFollowUps() {
            if(crmDatabase.length === 0) return;
            const today = new Date().toISOString().split('T')[0];
            const urgentList = crmDatabase.filter(c => !['SUPPLIER', 'SUB-CONTRACTOR', 'OTHERS'].includes(c.type) && c.followUp && c.followUp <= today && !['CLOSED WIN', 'CLOSED LOST'].includes(c.status));

            if(urgentList.length > 0) {
                setTimeout(() => { showToast(`SISTEM RADAR: ${urgentList.length} prospek perlu dihubungi!`, 'warning'); }, 1000);
                const lastSent = localStorage.getItem('dbss_radar_last_sent');
                if(lastSent !== today) {
                    let tgMsg = `⚠️ *RADAR FOLLOW-UP HARI INI*\nSistem mengesan ${urgentList.length} prospek perlu dihubungi segera:\n\n`;
                    urgentList.forEach((c, i) => { tgMsg += `${i+1}. *${c.name}* (${c.system || '-'}) - ${c.phone || '-'}\n`; });
                    sendTelegramAlert(tgMsg, false).then(() => { localStorage.setItem('dbss_radar_last_sent', today); });
                }
            }
        }

        function deleteContact(id) {
            showAlert("Adakah anda pasti mahu memadam rekod ini secara kekal?", () => {
                const contactToDelete = crmDatabase.find(c => c.id === id);
                crmDatabase = crmDatabase.filter(c => c.id !== id);
                localStorage.setItem('dbss_crm_database', JSON.stringify(crmDatabase));
                showToast("Rekod dipadam.", "success");
                
                if(contactToDelete) {
                    const tgMsg = `🗑️ *AMARAN: DATA DIPADAM*\nRekod *${contactToDelete.name}* (Tel: ${contactToDelete.phone || '-'}) telah dipadam dari sistem CRM.\n🕒 Tarikh: ${new Date().toLocaleString('ms-MY')}`;
                    sendTelegramAlert(tgMsg, true);
                }
                renderCRM();
            });
        }

        function pushToQuotation(id) {
            const contact = crmDatabase.find(c => c.id === id);
            if(contact) {
                showAlert(`Bawa data ${contact.name} ke modul Sebutharga?`, () => {
                    localStorage.setItem('dbss_active_client', JSON.stringify(contact));
                    window.location.href = 'sebutharga.html';
                });
            }
        }

        function exportCSV() {
            if(crmDatabase.length === 0) return showToast("Pangkalan data kosong.", "error");
            let csvContent = "data:text/csv;charset=utf-8,ID,Jenis,Nama,Telefon,Alamat,Status,Tarikh Follow-Up,Sumber,Sistem,Kondisi Tapak,Nota,Tarikh Daftar\n";
            crmDatabase.forEach(function(c) {
                let row = [ c.id, c.type, c.name, c.phone, `"${(c.address || '').replace(/"/g, '""').replace(/\n/g, ' ')}"`, c.status || '', c.followUp || '', c.lead || '', c.system || '', c.condition || '', `"${(c.notes || '').replace(/"/g, '""').replace(/\n/g, ' ')}"`, c.dateAdded ];
                csvContent += row.join(",") + "\n";
            });
            const encodedUri = encodeURI(csvContent); const link = document.createElement("a");
            link.setAttribute("href", encodedUri); link.setAttribute("download", `DBSS_CRM_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            showToast("Berjaya dieksport ke CSV.");
        }

        function sendCRMAlertToTelegram() {
            if (!systemConfig.tgBotToken || !systemConfig.tgGroupChatId) return showToast("Sila tetapkan API Telegram di Settings.", "error");
            const today = new Date().toISOString().split('T')[0];
            const activeFollowUps = crmDatabase.filter(c => c.followUp === today);
            
            if(activeFollowUps.length === 0) return showToast("Tiada jadual Follow-Up hari ini.", "warning");

            let msg = `🚨 *TINDAKAN SUSULAN (FOLLOW-UP) HARI INI* 🚨\n\n`;
            activeFollowUps.forEach((c, i) => { msg += `${i+1}. *${c.name}* (${c.type})\n   - Tel: ${c.phone}\n   - Status: ${c.status}\n   - Nota: _${c.notes || 'Tiada nota'}_\n\n`; });
            sendTelegramAlert(msg, false);
        }
    </script>
