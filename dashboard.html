<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBSS OS | Command Center (Bento Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #0D1B2A; --glass-bg: rgba(18, 18, 18, 0.4); --glass-border: rgba(255, 255, 255, 0.08); 
            --text-main: #FFFFFF; --text-muted: #8B9BB4; --accent-blue: #007BFF; --accent-lime: #39FF14; 
            --accent-orange: #FFA500; --accent-red: #FF3B30; --accent-cyan: #00FFFF; --accent-purple: #9D4EDD;
            --bento-gap: 16px; --bento-radius: 24px;
        }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0 0 90px 0; box-sizing: border-box; 
               background-image: radial-gradient(circle at 50% -10%, #1a2a40 0%, var(--bg-dark) 70%); background-attachment: fixed; min-height: 100vh;}
        
        /* HEADER - SLIM & SLEEK */
        .top-header { padding: 15px 20px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; background: rgba(13, 27, 42, 0.7);}
        .module-title { font-weight: 800; font-size: 16px; color: #fff; letter-spacing: 2px; font-family: 'JetBrains Mono', monospace;}
        .module-title span { color: var(--accent-lime); }
        
        .container { padding: var(--bento-gap); max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: var(--bento-gap);}

        /* =========================================
           BENTO GRID SYSTEM 
           ========================================= */
        .bento-row { display: grid; gap: var(--bento-gap); }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        @media (max-width: 600px) {
            .grid-3 { grid-template-columns: repeat(2, 1fr); }
            .grid-4 { grid-template-columns: repeat(2, 1fr); }
        }

        /* BENTO CARDS & MICRO-INTERACTIONS */
        .bento-card { 
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.3) 100%); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: var(--bento-radius); 
            padding: 20px; position: relative; overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        
        /* Hover Effect Cecair / Timbul */
        .bento-card.interactive { cursor: pointer; }
        .bento-card.interactive:hover {
            transform: translateY(-5px) scale(1.02);
            background: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, rgba(0,0,0,0.4) 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.2);
        }
        .bento-card.interactive:active { transform: translateY(0) scale(0.98); }

        /* Glow Khusus Mengikut Tema Kad */
        .bento-card.glow-lime:hover { border-color: rgba(57, 255, 20, 0.5); box-shadow: 0 10px 40px rgba(57, 255, 20, 0.15); }
        .bento-card.glow-blue:hover { border-color: rgba(0, 123, 255, 0.5); box-shadow: 0 10px 40px rgba(0, 123, 255, 0.15); }
        .bento-card.glow-orange:hover { border-color: rgba(255, 165, 0, 0.5); box-shadow: 0 10px 40px rgba(255, 165, 0, 0.15); }
        .bento-card.glow-cyan:hover { border-color: rgba(0, 255, 255, 0.5); box-shadow: 0 10px 40px rgba(0, 255, 255, 0.15); }

        /* KANDUNGAN DALAMAN KAD */
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .card-icon { width: 36px; height: 36px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 16px; background: rgba(255,255,255,0.05); transition: 0.3s; }
        .bento-card.interactive:hover .card-icon { transform: rotate(10deg) scale(1.1); }
        
        .card-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-family: 'JetBrains Mono', monospace; font-weight: 600; letter-spacing: 0.5px;}
        .card-value { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; margin: 5px 0 0 0; line-height: 1.1; color: #fff;}
        .card-subtitle { font-size: 10px; color: var(--text-muted); margin-top: 5px; }

        /* WIDGET MASA (HUD) */
        .clock-widget { align-items: center; justify-content: center; text-align: center; }
        .time-display { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 800; color: var(--accent-cyan); text-shadow: 0 0 20px rgba(0, 255, 255, 0.3); margin: 0; letter-spacing: 1px;}
        .date-display { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 5px;}

        /* PROGRESS BAR HALUS */
        .mini-progress { width: 100%; height: 3px; background: rgba(255,255,255,0.05); border-radius: 3px; margin-top: 15px; overflow: hidden; }
        .mini-progress-fill { height: 100%; width: 75%; border-radius: 3px; }
        .fill-lime { background: var(--accent-lime); box-shadow: 0 0 10px var(--accent-lime);}

        /* PINTASAN MATRIKS ICON (DI TENGAH) */
        .matrix-icon-box { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; 
            text-decoration: none; padding: 15px 5px;
        }
        .matrix-icon-box svg { width: 28px; height: 28px; stroke: var(--text-muted); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .bento-card.interactive:hover .matrix-icon-box svg { stroke: var(--accent-lime); transform: translateY(-3px); stroke-width: 2;}
        .matrix-text { color: var(--text-muted); font-size: 10px; font-weight: 700; font-family: 'JetBrains Mono', monospace; transition: 0.3s;}
        .bento-card.interactive:hover .matrix-text { color: #fff; }

        /* APPOINTMENT & FEED AREA */
        .list-container { max-height: 220px; overflow-y: auto; padding-right: 5px; margin-top: 10px;}
        .list-container::-webkit-scrollbar { width: 4px; }
        .list-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        
        /* MICRO-INTERACTION LIST ITEM */
        .list-item { 
            display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; 
            background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-bottom: 8px; 
            transition: all 0.3s ease; border: 1px solid transparent; cursor: default;
        }
        .list-item:hover { 
            background: rgba(255,255,255,0.05); transform: translateX(5px); 
            border-color: rgba(255,255,255,0.1); box-shadow: -5px 5px 15px rgba(0,0,0,0.2);
        }

        /* APPOINTMENT SPECIFICS */
        .list-item.visit { border-left: 3px solid var(--accent-orange); }
        .list-item.onsite { border-left: 3px solid var(--accent-cyan); }
        .date-cube { text-align: center; background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 8px; min-width: 40px; transition: 0.3s;}
        .list-item:hover .date-cube { background: rgba(255,255,255,0.1); transform: scale(1.05);}
        .date-cube .day { font-size: 16px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #fff; line-height: 1;}
        .date-cube .month { font-size: 9px; color: var(--text-muted); text-transform: uppercase;}
        
        .item-info h4 { margin: 0 0 3px 0; font-size: 13px; font-weight: 600; color: #fff;}
        .item-info p { margin: 0; font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;}
        .mini-badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase;}
        .badge-visit { background: rgba(255, 165, 0, 0.15); color: var(--accent-orange); }
        .badge-onsite { background: rgba(0, 255, 255, 0.15); color: var(--accent-cyan); }
        
        /* DELETE BUTTON INTERACTION */
        .btn-del { background: transparent; border: none; color: var(--text-muted); font-size: 14px; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 5px;}
        .btn-del:hover { color: var(--accent-red); transform: scale(1.3) rotate(10deg); }

        /* FEED SPECIFICS */
        .feed-icon { width: 32px; height: 32px; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 14px; background: rgba(255,255,255,0.05); transition: 0.3s;}
        .list-item:hover .feed-icon { background: rgba(255,255,255,0.1); transform: scale(1.1); }
        .val-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: bold; text-align: right;}
        
        /* ADD BUTTON ANIMATION (PULSE) */
        .btn-pulse { 
            background: rgba(0, 123, 255, 0.15); color: var(--accent-blue); border: 1px solid var(--accent-blue); 
            border-radius: 8px; padding: 6px 12px; font-size: 10px; font-family: 'JetBrains Mono', monospace; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
            animation: softPulse 2s infinite;
        }
        .btn-pulse:hover { background: var(--accent-blue); color: #fff; animation: none; transform: scale(1.05);}
        @keyframes softPulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(0, 123, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0); }
        }

        /* MODAL */
        .custom-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; pointer-events: none; transition: 0.3s ease; }
        .custom-overlay.show { opacity: 1; pointer-events: auto; }
        .custom-modal { background: rgba(18, 18, 18, 0.95); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; width: 90%; max-width: 400px; padding: 25px; transform: translateY(30px) scale(0.95); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .custom-overlay.show .custom-modal { transform: translateY(0) scale(1); }
        
        .modal-title { font-size: 14px; color: var(--text-main); font-weight: bold; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 6px; font-family: 'JetBrains Mono', monospace;}
        .input-group input, .input-group select { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-family: 'Inter', sans-serif; font-size: 13px; box-sizing: border-box; transition: 0.3s;}
        .input-group input:focus, .input-group select:focus { outline: none; border-color: var(--accent-blue); background: rgba(0,0,0,0.6);}
        
        .modal-actions { display: flex; gap: 10px; margin-top: 25px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 12px; transition: 0.2s;}
        .btn-cancel { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text-muted); }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); color: #fff;}
        .btn-save { background: var(--accent-blue); color: #fff; }
        .btn-save:hover { background: #0056b3; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,123,255,0.4);}

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: rgba(13, 27, 42, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 10px; gap: 6px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        .nav-item.active { color: var(--accent-lime); transform: translateY(-5px);}
        .nav-item:hover:not(.active) { color: #fff; transform: translateY(-3px);}
        .nav-item svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="module-title">DBSS <span>OS</span></div>
        <div style="font-size: 10px; color: var(--accent-lime); font-family: 'JetBrains Mono'; font-weight:bold; display:flex; align-items:center; gap:5px;">
            <div style="width:6px; height:6px; background:var(--accent-lime); border-radius:50%; box-shadow:0 0 5px var(--accent-lime); animation: softPulse 2s infinite;"></div>
            SYNCED
        </div>
    </header>

    <div class="container">
        
        <div class="bento-row grid-2">
            <div class="bento-card clock-widget">
                <p class="time-display" id="liveTime">00:00</p>
                <div class="date-display" id="liveDate">DD/MM/YYYY</div>
                <div class="card-subtitle" style="margin-top:10px;">COMMAND CENTER</div>
            </div>
            <div class="bento-card interactive glow-lime">
                <div class="card-header">
                    <div class="card-title">JUMLAH UNJURAN</div>
                    <div class="card-icon" style="color:var(--accent-lime); background:rgba(57,255,20,0.1);">💰</div>
                </div>
                <div>
                    <div class="card-value" style="color:var(--accent-lime);">RM <span id="valProjection">0.00</span></div>
                    <div class="mini-progress"><div class="mini-progress-fill fill-lime"></div></div>
                </div>
            </div>
        </div>

        <div class="bento-row grid-4">
            <div class="bento-card interactive glow-blue" onclick="window.location.href='crm.html'">
                <div class="card-title">KLIEN</div>
                <div class="card-value" id="valClients" style="color:var(--accent-blue);">00</div>
            </div>
            <div class="bento-card interactive glow-orange" onclick="window.location.href='sebutharga.html'">
                <div class="card-title">DRAF QT</div>
                <div class="card-value" id="valQuotes" style="color:var(--accent-orange);">00</div>
            </div>
            
            <a href="invoice.html" class="bento-card interactive glow-cyan matrix-icon-box">
                <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                <span class="matrix-text">INVOIS</span>
            </a>
            <a href="inventory.html" class="bento-card interactive glow-cyan matrix-icon-box">
                <svg viewBox="0 0 24 24"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                <span class="matrix-text">STOK</span>
            </a>
        </div>

        <div class="bento-row">
            <div class="bento-card" style="padding: 20px 20px 10px 20px;">
                <div class="card-header" style="align-items: center; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 5px;">
                    <div class="card-title" style="margin:0; font-size:12px;">📅 JADUAL TEMU JANJI TAPAK</div>
                    <button class="btn-pulse" onclick="openApptModal()">+ TAMBAH</button>
                </div>
                <div class="list-container" id="apptContainer">
                    <div style="text-align:center; color:var(--text-muted); font-size:11px; padding: 20px;">Tiada temu janji dijadualkan.</div>
                </div>
            </div>
        </div>

        <div class="bento-row">
            <div class="bento-card" style="padding: 20px 20px 10px 20px;">
                <div class="card-header" style="border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 5px;">
                    <div class="card-title" style="margin:0; font-size:12px;">⚡ LOG AKTIVITI TERKINI</div>
                </div>
                <div class="list-container" id="activityFeed">
                    <div style="text-align:center; color:var(--text-muted); font-size:11px; padding: 20px;">Mengimbas memori pangkalan data...</div>
                </div>
            </div>
        </div>
        
    </div>

    <div class="custom-overlay" id="apptModalOverlay">
        <div class="custom-modal">
            <div class="modal-title">Jadualkan Temu Janji</div>
            
            <div class="input-group">
                <label>NAMA KLIEN / PROJEK</label>
                <input type="text" id="apptName" placeholder="Cth: En. Ali - Pemasangan CCTV" autocomplete="off" required>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="input-group">
                    <label>TARIKH</label>
                    <input type="date" id="apptDate" required>
                </div>
                <div class="input-group">
                    <label>MASA</label>
                    <input type="time" id="apptTime" required>
                </div>
            </div>

            <div class="input-group">
                <label>JENIS TEMU JANJI</label>
                <select id="apptType">
                    <option value="Visit">Site Visit (Tinjauan)</option>
                    <option value="Onsite">On-Site Work (Kerja Tapak)</option>
                </select>
            </div>

            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeApptModal()">BATAL</button>
                <button class="btn-modal btn-save" onclick="saveAppt()">SIMPAN JADUAL</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            Command
        </a>
        <a href="crm.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            Workspace
        </a>
        <a href="settings.html" class="nav-item">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            System
        </a>
    </nav>

    <script>
        // ------------------ CLOCK LOGIC ------------------
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            const dateStr = now.toLocaleDateString('ms-MY', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });
            document.getElementById('liveTime').innerText = timeStr;
            document.getElementById('liveDate').innerText = dateStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ------------------ SYSTEM INIT ------------------
        let appointments = [];

        window.onload = function() {
            // Stats Calculation
            let totalQuotations = 0; let totalProjection = 0; let totalClients = 0;
            
            const savedQuotes = localStorage.getItem('dbss_saved_quotes');
            if (savedQuotes) {
                const quotes = JSON.parse(savedQuotes);
                totalQuotations = quotes.length;
                quotes.forEach(q => { totalProjection += parseFloat(q.total) || 0; });
            }

            const crmData = localStorage.getItem('dbss_crm_database');
            if (crmData) {
                const crm = JSON.parse(crmData);
                totalClients = crm.filter(c => c.type === 'CLIENT' || c.type === 'MAINTENANCE').length;
            }

            document.getElementById('valProjection').innerText = totalProjection.toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('valClients').innerText = totalClients < 10 ? '0' + totalClients : totalClients;
            document.getElementById('valQuotes').innerText = totalQuotations < 10 ? '0' + totalQuotations : totalQuotations;

            buildActivityFeed();
            loadAppointments();
        };

        // ------------------ APPOINTMENT MODULE ------------------
        function loadAppointments() {
            const stored = localStorage.getItem('dbss_appointments');
            if(stored) appointments = JSON.parse(stored);
            
            const todayStr = new Date().toISOString().split('T')[0];
            appointments = appointments.filter(a => a.date >= todayStr);
            appointments.sort((a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time));
            localStorage.setItem('dbss_appointments', JSON.stringify(appointments));

            renderAppointments();
        }

        function renderAppointments() {
            const container = document.getElementById('apptContainer');
            container.innerHTML = '';

            if(appointments.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:11px; padding: 20px;">Tiada temu janji dijadualkan. Masa untuk berehat.</div>';
                return;
            }

            appointments.forEach((appt, index) => {
                const dateObj = new Date(appt.date);
                const day = dateObj.getDate();
                const month = dateObj.toLocaleString('ms-MY', { month: 'short' });
                
                let typeClass = appt.type === 'Visit' ? 'visit' : 'onsite';
                let badgeClass = appt.type === 'Visit' ? 'badge-visit' : 'badge-onsite';
                let badgeText = appt.type === 'Visit' ? 'SITE VISIT' : 'ON-SITE';

                const div = document.createElement('div');
                div.className = `list-item ${typeClass}`;
                div.innerHTML = `
                    <div class="date-cube">
                        <div class="day">${day}</div>
                        <div class="month">${month}</div>
                    </div>
                    <div class="item-info">
                        <h4>${appt.name}</h4>
                        <p>🕒 ${appt.time} &nbsp;&nbsp; <span class="mini-badge ${badgeClass}">${badgeText}</span></p>
                    </div>
                    <div>
                        <button class="btn-del" onclick="deleteAppt(${index})">🗑️</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function openApptModal() {
            document.getElementById('apptDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('apptModalOverlay').classList.add('show');
        }

        function closeApptModal() {
            document.getElementById('apptModalOverlay').classList.remove('show');
            document.getElementById('apptName').value = '';
            document.getElementById('apptTime').value = '';
        }

        function saveAppt() {
            const name = document.getElementById('apptName').value.trim();
            const date = document.getElementById('apptDate').value;
            const time = document.getElementById('apptTime').value;
            const type = document.getElementById('apptType').value;

            if(!name || !date || !time) return alert("Sila lengkapkan semua maklumat.");

            appointments.push({ name, date, time, type });
            localStorage.setItem('dbss_appointments', JSON.stringify(appointments));
            
            closeApptModal();
            loadAppointments();
        }

        function deleteAppt(index) {
            if(confirm("Padam temu janji ini dari pangkalan data?")) {
                appointments.splice(index, 1);
                localStorage.setItem('dbss_appointments', JSON.stringify(appointments));
                renderAppointments();
            }
        }

        // ------------------ ACTIVITY FEED MODULE ------------------
        function buildActivityFeed() {
            const feedContainer = document.getElementById('activityFeed');
            let feedItems = [];

            const quotesStr = localStorage.getItem('dbss_saved_quotes');
            if(quotesStr) {
                JSON.parse(quotesStr).slice(0, 3).forEach(q => { feedItems.push({ type: 'QT', ref: q.ref, name: q.clientName, date: q.date, total: q.total }); });
            }

            const invStr = localStorage.getItem('dbss_saved_invoices');
            if(invStr) {
                JSON.parse(invStr).slice(0, 3).forEach(inv => { feedItems.push({ type: 'INV', ref: inv.invNo, name: inv.clientName, date: inv.date, total: inv.total, status: inv.status }); });
            }

            if(feedItems.length === 0) {
                feedContainer.innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:11px; padding: 20px;">Tiada aktiviti dikesan. Sistem masih kosong.</div>';
                return;
            }

            feedContainer.innerHTML = '';
            feedItems.slice(0, 5).forEach(item => {
                let isQT = item.type === 'QT';
                let iconStr = isQT ? '📄' : '🧾';
                let colorVar = isQT ? 'var(--accent-orange)' : 'var(--accent-lime)';
                let bgVar = isQT ? 'rgba(255,165,0,0.15)' : 'rgba(57,255,20,0.15)';
                let statusText = isQT ? 'DRAF' : (item.status || 'ISSUED');
                
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div class="feed-icon" style="color:${colorVar};">${iconStr}</div>
                    <div class="item-info">
                        <h4>${item.name}</h4>
                        <p>${item.ref} • ${item.date}</p>
                    </div>
                    <div style="text-align:right;">
                        <div class="val-text" style="color: ${colorVar}">RM ${(item.total||0).toFixed(2)}</div>
                        <div style="margin-top:5px;"><span class="mini-badge" style="background:${bgVar}; color:${colorVar};">${statusText}</span></div>
                    </div>
                `;
                feedContainer.appendChild(div);
            });
        }
    </script>
</body>
</html>
